<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>BC.GAME</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#1b1d23;
color:white;
max-width:430px;
margin:auto;
overflow-x:hidden;
}

.top img{
width:100%;
display:block;
}

.tabs{
display:flex;
justify-content:center;
gap:90px;
padding:16px 0 10px;
border-bottom:1px solid #2d3138;
font-size:16px;
font-weight:700;
}

.active{
color:white;
border-bottom:2px solid #00ff99;
padding-bottom:10px;
}

.inactive{
color:#8b9097;
padding-bottom:10px;
}

.main{
padding:18px;
}

.switch{
display:flex;
background:#343840;
border-radius:12px;
overflow:hidden;
margin-bottom:18px;
}

.switch div{
flex:1;
text-align:center;
padding:14px;
font-size:13px;
font-weight:700;
color:#c9c9c9;
}

.switch .on{
background:#40454d;
color:white;
}

.small{
text-align:center;
font-size:11px;
color:#8f949c;
margin-bottom:18px;
}

.label{
font-size:13px;
margin-bottom:8px;
color:#d5d5d5;
}

.box{
background:#1e2127;
border:1px solid #343941;
border-radius:12px;
padding:16px;
margin-bottom:16px;
}

.box input{
width:100%;
background:none;
border:none;
outline:none;
color:white;
font-size:14px;
}

.box input::placeholder{
color:#7d838b;
}

.forgot{
text-align:right;
font-size:12px;
color:#c4c4c4;
margin-bottom:18px;
}

.btn{
width:100%;
border:none;
border-radius:12px;
padding:16px;
background:linear-gradient(to right,#16d96d,#98ff67);
font-size:20px;
font-weight:700;
color:black;
}

.create{
margin-top:16px;
font-size:12px;
color:#bdbdbd;
}

.create span{
color:#4eff8f;
font-weight:700;
}

.direct{
display:flex;
align-items:center;
margin:22px 0 18px;
color:#8e939a;
font-size:12px;
}

.direct::before,
.direct::after{
content:"";
flex:1;
height:1px;
background:#343941;
}

.direct span{
padding:0 10px;
}

.passkey{
border:1px solid #343941;
border-radius:12px;
padding:15px;
text-align:center;
font-size:14px;
font-weight:700;
margin-bottom:18px;
}

.icons{
display:flex;
justify-content:space-between;
gap:8px;
}

.icon{
width:48px;
height:48px;
border:1px solid #343941;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
color:white;
background:#1f2227;
}

.footer{
text-align:center;
font-size:11px;
color:#737373;
margin-top:24px;
padding-bottom:20px;
}

</style>
</head>

<body>

<div class="top">
<img src="IMG_0527.jpeg">
</div>

<div class="tabs">
<div class="active">Sign In</div>
<div class="inactive">Sign Up</div>
</div>

<div class="main">

<div class="switch">
<div class="on">🔒 Password</div>
<div>📱 One-time Code</div>
</div>

<div class="small">
Download the App for more fun
</div>

<div class="label">
Email / Phone Number / Username
</div>

<div class="box">
<input type="text" placeholder="">
</div>

<div class="label">
Password
</div>

<div class="box">
<input type="password" placeholder="">
</div>

<div class="forgot">
Forgot your password?
</div>
<button class="btn" onclick="nextPage()">
Sign In
</button>

<div class="create">
New to BC.GAME? <span>Create account</span>
</div>

<div class="direct">
<span>Log in directly with</span>
</div>

<div class="passkey">
👥 Sign In with passkey
</div>

<div class="icons">

<div class="icon">G</div>
<div class="icon">X</div>
<div class="icon">✈</div>
<div class="icon">🦊</div>
<div class="icon">〰</div>
<div class="icon">💬</div>
<div class="icon">⚙</div>

</div>

<div class="footer">
© BC.GAME
</div>

</div>

<script>

function nextPage(){

window.location.href="dashboard.html";

}

</script>
</script>
</body>
</html>
