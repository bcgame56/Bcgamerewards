<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BC.GAME</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#1d1f24;
color:white;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
border-bottom:1px solid #2c3138;
}

.tabs{
display:flex;
gap:80px;
font-size:20px;
font-weight:bold;
}

.tab{
padding-bottom:14px;
color:#9ea3aa;
}

.active{
color:white;
border-bottom:3px solid #00ff99;
}

.close{
width:42px;
height:42px;
background:#343940;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:22px;
}

.switch{
display:flex;
background:#31363d;
border-radius:16px;
overflow:hidden;
margin-bottom:30px;
}

.switch div{
flex:1;
padding:18px;
text-align:center;
font-size:18px;
font-weight:bold;
color:#c2c6cb;
}

.switch .active2{
background:#3b4047;
color:white;
}

.label{
font-size:18px;
margin-top:18px;
margin-bottom:10px;
font-weight:600;
}

.red{
color:#ff4d4d;
}

.input-box{
border:2px solid #00ff99;
border-radius:16px;
padding:20px;
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:22px;
background:#1d1f24;
}

.password-box{
border:1px solid #3d4248;
}

.input-box input{
width:100%;
background:none;
border:none;
outline:none;
color:white;
font-size:22px;
}

.input-box input::placeholder{
color:#8e949c;
font-weight:600;
}

.eye{
font-size:22px;
color:#a0a6ad;
}

.forgot{
text-align:right;
font-size:17px;
font-weight:bold;
margin-bottom:22px;
color:#d6d9de;
}

.login-btn{
width:100%;
padding:20px;
border:none;
border-radius:18px;
background:#1f8d52;
font-size:34px;
font-weight:800;
color:black;
cursor:pointer;
}

.direct{
display:flex;
align-items:center;
margin:36px 0 24px;
color:#9aa0a8;
font-size:18px;
font-weight:600;
}

.direct::before,
.direct::after{
content:'';
flex:1;
height:1px;
background:#353941;
}

.direct span{
margin:0 14px;
}

.wallet{
background:#343940;
padding:22px;
border-radius:16px;
text-align:center;
font-size:28px;
font-weight:800;
margin-bottom:20px;
}

.passkey{
border:1px solid #3c4048;
padding:22px;
border-radius:16px;
text-align:center;
font-size:25px;
font-weight:800;
}

.socials{
display:flex;
justify-content:space-between;
margin-top:30px;
}

.social{
width:58px;
height:58px;
border:1px solid #3d4248;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
font-weight:bold;
}

.footer{
text-align:center;
margin-top:35px;
padding-bottom:20px;
font-size:14px;
color:#777;
}

</style>
</head>

<body>

<div class="topbar">

<div class="tabs">
<div class="tab active">Sign In</div>
<div class="tab">Sign Up</div>
</div>

<div class="close">
✕
</div>

</div>

<div class="container">

<div class="switch">

<div class="active2">
<i class="fa-solid fa-lock"></i>
Password
</div>

<div>
<i class="fa-solid fa-mobile-screen"></i>
One-time Code
</div>

</div>

<div class="label">
Email / Phone Number <span class="red">*</span>
</div>

<div class="input-box">
<input type="text" placeholder="You@gmail.com / +91...">
</div>

<div class="label">
Password <span class="red">*</span>
</div>

<div class="input-box password-box">

<input type="password" placeholder="Min 6 Characters">

<div class="eye">
<i class="fa-regular fa-eye"></i>
</div>

</div>

<div class="forgot">
Forgot your password?
</div>

<button class="login-btn" onclick="login()">
Sign In
</button>

<div class="direct">
<span>Log in directly with</span>
</div>

<div class="wallet">
Cwallet
</div>

<div class="passkey">
Sign In with Passkey
</div>

<div class="socials">

<div class="social">G</div>

<div class="social">𝕏</div>

<div class="social">✈</div>

<div class="social">👾</div>

<div class="social">〰</div>

<div class="social">L</div>

<div class="social">⚙</div>

</div>

<div class="footer">
© BC.GAME
</div>

</div>

<script>

function login(){

window.location.href="dashboard.html";

}

</script>

</body>
</html>
