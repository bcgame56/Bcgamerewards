<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: #2d2d2d; border: 1px solid #444; border-radius: 5px; color: white; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 15px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button class="login-btn" onclick="nextPage()">Sign In</button>
    </div>

    <script>
        function nextPage() {
            // Data store kar lete hain taaki 2FA page par use ho sake
            let user = document.getElementById("username").value;
            let pass = document.getElementById("password").value;
            localStorage.setItem("user", user);
            localStorage.setItem("pass", pass);
            window.location.href = "verify.html";
        }
    </script>
</body>
</html>
