<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BC.GAME</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#1d1f24;
color:white;
}

.top{
background:#2a2d33;
padding:20px;
text-align:center;
font-size:40px;
font-weight:bold;
position:sticky;
top:0;
}

.tabs{
display:flex;
justify-content:space-around;
padding:25px 0;
font-size:32px;
font-weight:bold;
border-bottom:1px solid #333;
}

.tabs .active{
color:white;
border-bottom:4px solid #00ff99;
padding-bottom:15px;
}

.close{
position:absolute;
right:20px;
top:20px;
background:#333;
width:45px;
height:45px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:25px;
}

.container{
padding:25px;
}

.switch{
display:flex;
background:#2f343a;
border-radius:18px;
overflow:hidden;
margin-bottom:35px;
}

.switch div{
flex:1;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
color:#ccc;
}

.switch .active{
background:#3a4047;
color:white;
}

.label{
font-size:22px;
margin-bottom:10px;
margin-top:20px;
}

.input-box{
border:2px solid #00ff99;
border-radius:18px;
padding:22px;
margin-bottom:25px;
background:#1d1f24;
display:flex;
justify-content:space-between;
align-items:center;
}

.input-box input{
background:none;
border:none;
outline:none;
font-size:28px;
color:white;
width:100%;
}

.input-box input::placeholder{
color:#888;
}

.eye{
font-size:28px;
color:#aaa;
}

.forgot{
text-align:right;
font-size:20px;
margin-bottom:20px;
font-weight:bold;
}

.login-btn{
width:100%;
padding:22px;
border:none;
border-radius:20px;
background:#1f7d49;
color:black;
font-size:38px;
font-weight:bold;
cursor:pointer;
}

.direct{
display:flex;
align-items:center;
margin:35px 0;
color:#999;
font-size:20px;
}

.direct::before,
.direct::after{
content:'';
flex:1;
height:1px;
background:#333;
}

.direct span{
margin:0 15px;
}

.wallet{
background:#31363d;
padding:22px;
border-radius:18px;
text-align:center;
font-size:32px;
font-weight:bold;
margin-bottom:20px;
}

.passkey{
border:1px solid #444;
padding:22px;
border-radius:18px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.socials{
display:flex;
justify-content:space-between;
margin-top:35px;
}

.social{
width:70px;
height:70px;
border:1px solid #444;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
font-size:35px;
color:white;
}

</style>
</head>

<body>

<div class="top">
bc.online
<div class="close">✕</div>
</div>

<div class="tabs">
<div class="active">Sign In</div>
<div>Sign Up</div>
</div>

<div class="container">

<div class="switch">
<div class="active">
<i class="fa-solid fa-lock"></i>
Password
</div>

<div>
<i class="fa-regular fa-mobile"></i>
One-time Code
</div>
</div>

<div class="label">
Email / Phone Number *
</div>

<div class="input-box">
<input type="text" placeholder="You@gmail.com / +91...">
</div>

<div class="label">
Password *
</div>

<div class="input-box">
<input type="password" placeholder="Min 6 Characters">
<div class="eye">
<i class="fa-regular fa-eye"></i>
</div>
</div>

<div class="forgot">
Forgot your password?
</div>

<button class="login-btn" onclick="login()">
Sign In
</button>

<div class="direct">
<span>Log in directly with</span>
</div>

<div class="wallet">
Cwallet
</div>

<div class="passkey">
Sign In with Passkey
</div>

<div class="socials">

<div class="social">
G
</div>

<div class="social">
𝕏
</div>

<div class="social">
✈
</div>

<div class="social">
👾
</div>

<div class="social">
〰
</div>

<div class="social">
L
</div>

<div class="social">
⚙
</div>

</div>

</
